# llama-swap config — F3A-tuned defaults for AMD Radeon 890M (Vulkan/RADV).
#
# Flags below match the verified bench config in project_f3a_llm_stack.md:
#   -ngl 99 -fa on -ctk q8_0 -ctv q8_0
# Model paths resolve via /models, which is a bind mount of ~/llama-models on
# the host. That dir contains symlinks into Ollama's blob cache; we mount that
# cache too so the symlinks resolve.
#
# Add a model: drop a .gguf (or symlink to one) into ~/llama-models, add a
# block here, restart the stack: `docker compose restart`.

models:
  qwen3-30b-a3b-q4_K_M:
    cmd: |
      /app/llama-server
      --host 0.0.0.0
      --port ${PORT}
      --model /models/qwen3-30b-a3b-q4_K_M.gguf
      -ngl 99
      -fa on
      -ctk q8_0
      -ctv q8_0
      --ctx-size 32768
      --batch-size 2048
      --ubatch-size 512
      --jinja
    env:
      - "AMD_VULKAN_ICD=RADV"
    # Stay loaded — primary chat for RagFlow. Avoid swap thrash on the iGPU.
    ttl: 0

  bge-m3:
    cmd: |
      /app/llama-server
      --host 0.0.0.0
      --port ${PORT}
      --model /models/bge-m3.gguf
      -ngl 99
      --embeddings
      --pooling mean
      --ctx-size 8192
      --batch-size 8192
      --ubatch-size 8192
    env:
      - "AMD_VULKAN_ICD=RADV"
    # Persistent embedding model — RagFlow hits this constantly during indexing.
    # batch-size must equal ctx-size for embeddings: the whole input runs in one
    # physical batch, no rolling window like chat models.
    ttl: 0

  qwen3-vl-8b:
    cmd: |
      /app/llama-server
      --host 0.0.0.0
      --port ${PORT}
      --model /models/qwen3-vl-8b-q4_K_M.gguf
      --mmproj /models/qwen3-vl-8b-mmproj-q8_0.gguf
      -ngl 99
      -fa on
      -ctk q8_0
      -ctv q8_0
      --ctx-size 32768
      --batch-size 2048
      --ubatch-size 512
      --jinja
    env:
      - "AMD_VULKAN_ICD=RADV"
    # VLM — RagFlow uses this for figure captioning during PDF parsing
    # (parser_config.image_context_size > 0). Lazy-load: ttl unset (default
    # ~5min eviction) since RAG queries don't normally invoke it.
